name: Annotate Game Results

on:
  schedule:
    - cron: '0 7 * * *'  # 3 AM ET (UTC-4) — after all US games finish
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to annotate (YYYY-MM-DD, default: yesterday)'
        required: false
        default: 'yesterday'

permissions:
  contents: write

jobs:
  annotate:
    runs-on: ubuntu-latest
    env:
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Set annotation date
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ "${DATE}" = "yesterday" ] || [ -z "${DATE}" ]; then
            ANNOT_DATE=$(python3 -c "from datetime import datetime,timezone,timedelta; print((datetime.now(timezone(timedelta(hours=-4)))-timedelta(days=1)).strftime('%Y-%m-%d'))")
          else
            ANNOT_DATE="${DATE}"
          fi
          echo "ANNOT_DATE=$ANNOT_DATE" >> $GITHUB_ENV

      - name: Annotate results
        run: |
          python3 history.py --annotate --date "$ANNOT_DATE"
          python3 picks.py --annotate --date "$ANNOT_DATE"

      - name: Commit annotations
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ picks/
          git diff --staged --quiet || (git commit -m "Annotate: results $ANNOT_DATE" && git push)
