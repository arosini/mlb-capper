name: Update MLB Dashboard

on:
  schedule:
    - cron: '30 7 * * *'   # 3:30 AM ET (UTC-4)
    - cron: '0 14 * * *'   # 10 AM ET
    - cron: '0 20 * * *'   # 4 PM ET
    - cron: '30 22 * * *'  # 6:30 PM ET — tomorrow's Handigraphs slate is usually posted by now
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]        # redeploy on every push to main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Set cache date
        run: |
          python3 -c "from datetime import datetime,timezone,timedelta; print('CACHE_DATE='+datetime.now(timezone(timedelta(hours=-4))).strftime('%Y-%m-%d'))" >> $GITHUB_ENV
          python3 -c "from datetime import datetime,timezone,timedelta; print('TOMORROW_DATE='+(datetime.now(timezone(timedelta(hours=-4)))+timedelta(days=1)).strftime('%Y-%m-%d'))" >> $GITHUB_ENV

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/
          key: odds-${{ env.CACHE_DATE }}
          restore-keys: |
            odds-

      - name: Clean stale data files
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          # Remove any data files not dated today or tomorrow — prevents prior-day
          # files from accumulating in the cache all season and ensures a clean
          # slate each run, while preserving tomorrow's files (and their odds/props
          # meta timestamps) across same-day reruns so their fetch throttle works.
          find data/ -maxdepth 1 -type f ! -name "*${{ env.CACHE_DATE }}*" ! -name "*${{ env.TOMORROW_DATE }}*" -delete
          echo "Data dir after cleanup: $(ls data/ 2>/dev/null | wc -l) files"

      - name: Refresh starters
        env:
          HANDIGRAPHS_EMAIL: ${{ secrets.HANDIGRAPHS_EMAIL }}
          HANDIGRAPHS_PASSWORD: ${{ secrets.HANDIGRAPHS_PASSWORD }}
        run: python3 download.py --starters-only

      - name: Download data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          HANDIGRAPHS_EMAIL: ${{ secrets.HANDIGRAPHS_EMAIL }}
          HANDIGRAPHS_PASSWORD: ${{ secrets.HANDIGRAPHS_PASSWORD }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python3 download.py

      - name: Download tomorrow's data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          HANDIGRAPHS_EMAIL: ${{ secrets.HANDIGRAPHS_EMAIL }}
          HANDIGRAPHS_PASSWORD: ${{ secrets.HANDIGRAPHS_PASSWORD }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          # 6:30 PM ET run forces a fresh odds/props fetch — earlier runs may land
          # before Handigraphs/the Odds API have posted tomorrow's slate at all, so
          # the normal 5h throttle would otherwise lock in an empty/stale fetch for
          # the rest of the evening.
          if [ "${{ github.event.schedule }}" = "30 22 * * *" ]; then
            python3 download.py --date tomorrow --force-odds
          else
            python3 download.py --date tomorrow
          fi

      - name: Clear stale suggestions
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: rm -f data/suggestions_*.json data/suggestions_meta_*.json

      - name: Save odds history
        run: python3 history.py --save

      - name: Generate AI suggestions
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 handicap.py --suggestions-only

      - name: Save AI picks
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python3 picks.py --save

      - name: Generate HTML
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p _site
          python3 handicap.py --html > _site/index.html
          echo "Generated $(wc -c < _site/index.html) bytes"
          printf '/*\n  Cache-Control: no-cache, max-age=0, must-revalidate\n' > _site/_headers

      - name: Generate tomorrow HTML
        run: |
          # Deliberately no ANTHROPIC_API_KEY here — this is a matchup/odds preview,
          # not the AI-picks page, so we skip triggering a Claude call for it.
          # Runs every deploy (not just the tomorrow-data steps above) because
          # Cloudflare Pages deploys are full-snapshot replacements — if this file
          # were only written on the 6:30 PM run, the other 3 daily deploys would
          # wipe it from the live site.
          mkdir -p _site/tomorrow
          python3 handicap.py --date tomorrow --html > _site/tomorrow/index.html
          echo "Generated $(wc -c < _site/tomorrow/index.html) bytes"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3"
          command: pages deploy _site --project-name=mlb-capper --commit-dirty=true

      - name: Annotate results
        run: |
          python3 history.py --annotate --date yesterday
          python3 picks.py   --annotate --date yesterday
          python3 history.py --annotate
          python3 picks.py   --annotate

      - name: Commit history and picks
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Picks are only saved/committed on scheduled or manually dispatched runs.
          IS_SCHEDULED=false
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IS_SCHEDULED=true
          fi

          _save_and_annotate() {
            python3 history.py --save
            python3 history.py --annotate --date yesterday
            python3 history.py --annotate
            if [ "$IS_SCHEDULED" = "true" ]; then
              python3 picks.py --save
            fi
            python3 picks.py   --annotate --date yesterday
            python3 picks.py   --annotate
          }

          if [ "$IS_SCHEDULED" = "true" ]; then
            git add history/ picks/ data/starters_last3g_today_*.json
          else
            git add history/ data/starters_last3g_today_*.json
          fi
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "History: odds $CACHE_DATE"
          git push && exit 0

          for _retry in 1 2; do
            git reset HEAD~1
            if [ "$IS_SCHEDULED" = "true" ]; then
              git clean -f history/ picks/ data/starters_last3g_today_*.json 2>/dev/null || true
              git checkout -- history/ picks/ data/starters_last3g_today_*.json 2>/dev/null || true
            else
              git clean -f history/ data/starters_last3g_today_*.json 2>/dev/null || true
              git checkout -- history/ data/starters_last3g_today_*.json 2>/dev/null || true
            fi
            git pull origin main
            _save_and_annotate
            if [ "$IS_SCHEDULED" = "true" ]; then
              git add history/ picks/ data/starters_last3g_today_*.json
            else
              git add history/ data/starters_last3g_today_*.json
            fi
            git diff --staged --quiet && exit 0
            git commit -m "History: odds $CACHE_DATE"
            git push && exit 0
          done
          echo "[history] Push failed after retries — will try again next run"
