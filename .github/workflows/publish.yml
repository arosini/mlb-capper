name: Update MLB Dashboard

on:
  schedule:
    - cron: '0 10 * * *'  # 6 AM ET (10 AM UTC)
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]        # redeploy on every push to main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Set cache date
        run: echo "CACHE_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Restore odds cache
        uses: actions/cache@v4
        with:
          path: data/
          key: odds-${{ env.CACHE_DATE }}
          restore-keys: |
            odds-

      - name: Download data
        env:
          HANDIGRAPHS_EMAIL: ${{ secrets.HANDIGRAPHS_EMAIL }}
          HANDIGRAPHS_PASSWORD: ${{ secrets.HANDIGRAPHS_PASSWORD }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python3 download.py

      - name: Generate HTML
        run: |
          mkdir -p _site
          python3 handicap.py --html > _site/index.html
          echo "Generated $(wc -c < _site/index.html) bytes"
          printf '/*\n  Cache-Control: no-cache, max-age=0, must-revalidate\n' > _site/_headers

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=mlb-capper --commit-dirty=true
