name: Update MLB Dashboard

on:
  schedule:
    - cron: '0 10 * * *'  # 6 AM ET (10 AM UTC, adjusts 1hr in winter)
  workflow_dispatch:        # manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download data
        env:
          HANDIGRAPHS_EMAIL: ${{ secrets.HANDIGRAPHS_EMAIL }}
          HANDIGRAPHS_PASSWORD: ${{ secrets.HANDIGRAPHS_PASSWORD }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python3 download.py

      - name: Generate HTML
        run: |
          mkdir -p _site
          python3 handicap.py --html > _site/index.html
          echo "Generated $(wc -c < _site/index.html) bytes"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
