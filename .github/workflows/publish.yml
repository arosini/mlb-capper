name: Update MLB Dashboard

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download data
        env:
          HANDIGRAPHS_EMAIL: ${{ secrets.HANDIGRAPHS_EMAIL }}
          HANDIGRAPHS_PASSWORD: ${{ secrets.HANDIGRAPHS_PASSWORD }}
        run: python3 download.py

      - name: Generate HTML
        run: |
          mkdir -p _site
          python3 handicap.py --html > _site/index.html
          echo "Generated $(wc -c < _site/index.html) bytes"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: "Update dashboard ${{ github.run_number }}"
